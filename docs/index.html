<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc & Tic-Tac-Toe</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #4a90e2;
            --accent: #ff6b6b;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            color: var(--text);
        }
        .container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 320px;
        }
        h2 { text-align: center; margin-top: 0; font-size: 1.2rem; color: var(--primary); }

        /* Calculator Styles */
        #calc-display {
            width: 100%;
            height: 50px;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #eee;
            border-radius: 8px;
        }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button {
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: #eee;
        }
        button:hover { background: #ddd; }
        .op { background: var(--primary); color: white; }
        .eq { background: #2ecc71; color: white; grid-column: span 2; }
        .clr { background: var(--accent); color: white; }

        /* Tic Tac Toe Styles */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 10px;
        }
        .cell {
            aspect-ratio: 1;
            background: #f9f9f9;
            border: 2px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .cell.taken { cursor: not-allowed; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; height: 20px; }
        .reset-btn { width: 100%; margin-top: 10px; background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Simple Calculator</h2>
        <input type="text" id="calc-display" disabled>
        <div class="grid">
            <button class="clr" onclick="clearCalc()">C</button>
            <button onclick="appendToCalc('/')">/</button>
            <button onclick="appendToCalc('*')">×</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendToCalc('7')">7</button>
            <button onclick="appendToCalc('8')">8</button>
            <button onclick="appendToCalc('9')">9</button>
            <button class="op" onclick="appendToCalc('-')">-</button>
            <button onclick="appendToCalc('4')">4</button>
            <button onclick="appendToCalc('5')">5</button>
            <button onclick="appendToCalc('6')">6</button>
            <button class="op" onclick="appendToCalc('+')">+</button>
            <button onclick="appendToCalc('1')">1</button>
            <button onclick="appendToCalc('2')">2</button>
            <button onclick="appendToCalc('3')">3</button>
            <button class="eq" onclick="calculate()">=</button>
            <button onclick="appendToCalc('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendToCalc('.')">.</button>
        </div>
    </div>

    <div class="container">
        <h2>Tic-Tac-Toe (vs Bot)</h2>
        <div id="status">Your Turn (X)</div>
        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        /* --- Calculator Logic --- */
        const display = document.getElementById('calc-display');
        function appendToCalc(val) { display.value += val; }
        function clearCalc() { display.value = ''; }
        function deleteLast() { display.value = display.value.slice(0, -1); }
        function calculate() {
            try { display.value = eval(display.value); }
            catch { display.value = 'Error'; }
        }

        /* --- Tic Tac Toe Logic (Minimax AI) --- */
        let board = Array(9).fill(null);
        const player = 'X', bot = 'O';
        const winCombos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function makeMove(idx) {
            if (!board[idx] && !checkWinner(board)) {
                board[idx] = player;
                updateBoard();
                if (!checkWinner(board) && board.includes(null)) {
                    setTimeout(botMove, 500);
                }
            }
        }

        function botMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (!board[i]) {
                    board[i] = bot;
                    let score = minimax(board, 0, false);
                    board[i] = null;
                    if (score > bestScore) { bestScore = score; move = i; }
                }
            }
            board[move] = bot;
            updateBoard();
        }

        function minimax(currBoard, depth, isMaximizing) {
            let result = checkWinner(currBoard);
            if (result === bot) return 10;
            if (result === player) return -10;
            if (!currBoard.includes(null)) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (!currBoard[i]) {
                        currBoard[i] = bot;
                        bestScore = Math.max(bestScore, minimax(currBoard, depth + 1, false));
                        currBoard[i] = null;
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (!currBoard[i]) {
                        currBoard[i] = player;
                        bestScore = Math.min(bestScore, minimax(currBoard, depth + 1, true));
                        currBoard[i] = null;
                    }
                }
                return bestScore;
            }
        }

        function checkWinner(b) {
            for (let combo of winCombos) {
                if (b[combo[0]] && b[combo[0]] === b[combo[1]] && b[combo[0]] === b[combo[2]]) 
                    return b[combo[0]];
            }
            return null;
        }

        function updateBoard() {
            const cells = document.getElementsByClassName('cell');
            board.forEach((val, i) => {
                cells[i].innerText = val || '';
                if (val) cells[i].classList.add('taken');
            });
            let win = checkWinner(board);
            if (win) document.getElementById('status').innerText = win === 'X' ? "You Win!" : "Bot Wins!";
            else if (!board.includes(null)) document.getElementById('status').innerText = "Draw!";
        }

        function resetGame() {
            board = Array(9).fill(null);
            const cells = document.getElementsByClassName('cell');
            for (let c of cells) { c.innerText = ''; c.classList.remove('taken'); }
            document.getElementById('status').innerText = "Your Turn (X)";
        }
    </script>
</body>
</html>
